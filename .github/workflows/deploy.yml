# Builds the Vite app and pushes static output to the `gh-pages` branch.
#
# GitHub repo → Settings → Pages:
#   Source: Deploy from a branch
#   Branch: gh-pages  /  Folder: / (root)
#
# App URL: https://<user>.github.io/<repo>/
# (NOT .../client/index.html — that file is dev source only.)

name: Deploy to gh-pages branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
